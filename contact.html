<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料体験のお申し込み ─ マナビエル</title>
  <meta name="description" content="マナビエルの無料体験授業のお申し込みフォーム。24時間以内にご返信いたします。" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .form-page { background: var(--bg); min-height: 100vh; }
    .form-shell {
      max-width: 680px; margin: 0 auto;
      padding: 64px 24px 96px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--ink-mute); font-size: 13.5px; font-weight: 600;
      text-decoration: none;
      transition: color .15s ease;
    }
    .back-link:hover { color: var(--ink); }
    .eyebrow {
      font-size: 12px; font-weight: 700; letter-spacing: 0.16em;
      color: var(--orange); text-transform: uppercase;
    }
    @media (max-width: 600px) {
      .form-shell { padding: 40px 18px 80px; }
    }
  </style>
</head>
<body class="form-page">
  <form name="free-trial" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="free-trial" />
    <input name="parentName" />
    <input name="email" type="email" />
    <input name="phone" />
    <input name="childGrade" />
    <input name="childName" />
    <input name="school" />
    <textarea name="message"></textarea>
    <input name="source" />
    <input name="privacy" />
    <input name="bot-field" />
  </form>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="form.jsx"></script>

  <script type="text/babel">
    function ContactPage() {
      return (
        <div>
          {/* ── ヘッダー ───────────────── */}
          <header style={{
            borderBottom: '1px solid var(--line)',
            background: 'rgba(250,250,247,0.85)',
            backdropFilter: 'blur(14px) saturate(140%)',
            WebkitBackdropFilter: 'blur(14px) saturate(140%)',
            position: 'sticky', top: 0, zIndex: 10,
          }}>
            <div style={{
              maxWidth: 1100, margin: '0 auto',
              padding: '14px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }}>
              <a href="index.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, textDecoration: 'none', color: 'var(--ink)' }}>
                <svg width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
                  <path d="M4 26 L4 8 L10 16 L16 8 L16 26" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                  <circle cx="22" cy="11" r="3" fill="currentColor" />
                  <path d="M22 17 L22 26" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/>
                </svg>
                <span style={{ fontWeight: 800, letterSpacing: '0.04em' }}>マナビエル</span>
              </a>
              <a href="index.html" className="back-link">
                <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                  <path d="M9 3 L5 7 L9 11" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                トップに戻る
              </a>
            </div>
          </header>

          <div className="form-shell">
            {/* ── イントロ ───────────────── */}
            <div style={{ marginBottom: 48 }}>
              <div className="eyebrow" style={{ marginBottom: 16 }}>FREE TRIAL ─ 無料体験のお申し込み</div>
              <h1 style={{
                margin: 0, fontFamily: 'var(--font-head)',
                fontSize: 'clamp(28px, 4.4vw, 44px)',
                fontWeight: 900, lineHeight: 1.3, letterSpacing: '-0.02em',
                color: 'var(--ink)',
              }}>
                どこで止まっているかを、<br/>
                一緒に見つけにいきませんか。
              </h1>
              <p style={{
                marginTop: 24, fontSize: 16, lineHeight: 1.85,
                color: 'var(--ink-soft)',
              }}>
                以下のフォームにご記入のうえ送信ください。<br/>
                通常 <strong style={{ color: 'var(--ink)' }}>24時間以内</strong> に担当者よりメールでご返信し、体験授業の日程を調整いたします。
              </p>

              {/* 流れバナー */}
              <div style={{
                marginTop: 32, padding: '20px 24px',
                background: 'var(--blue-soft)', borderRadius: 10,
                display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 16,
                fontSize: 13.5, fontWeight: 600, color: 'var(--ink)',
              }}>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <span style={{
                    width: 24, height: 24, borderRadius: 999, background: 'var(--blue)', color: '#fff',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800,
                  }}>1</span>お申し込み
                </span>
                <span style={{ color: 'var(--ink-mute)' }}>→</span>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <span style={{
                    width: 24, height: 24, borderRadius: 999, background: 'var(--blue)', color: '#fff',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800,
                  }}>2</span>日程調整
                </span>
                <span style={{ color: 'var(--ink-mute)' }}>→</span>
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
                  <span style={{
                    width: 24, height: 24, borderRadius: 999, background: 'var(--blue)', color: '#fff',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800,
                  }}>3</span>無料体験（60分）
                </span>
              </div>
            </div>

            {/* ── フォームカード ───────────────── */}
            <div style={{
              background: '#fff',
              border: '1px solid var(--line)',
              borderRadius: 12,
              padding: 'clamp(28px, 5vw, 48px)',
              boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
            }}>
              <ContactForm />
            </div>

            {/* ── フッター注釈 ───────────────── */}
            <div style={{
              marginTop: 40, textAlign: 'center',
              fontSize: 13, color: 'var(--ink-mute)', lineHeight: 1.8,
            }}>
              お電話でのお問い合わせも承ります<br/>
              <span style={{ display: 'inline-block', marginTop: 6, fontSize: 18, fontWeight: 800, color: 'var(--ink)', letterSpacing: '0.02em' }}>
                075-384-1186
              </span>
              <span style={{ marginLeft: 12, fontSize: 12 }}>（平日 10:00 – 21:00）</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ContactPage />);
  </script>
</body>
</html>
