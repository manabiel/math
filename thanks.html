<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込みありがとうございました ─ マナビエル</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--bg); }
    .thanks-shell {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }
    .thanks-card {
      max-width: 600px; width: 100%;
      background: #fff; border: 1px solid var(--line); border-radius: 14px;
      padding: clamp(40px, 6vw, 72px) clamp(28px, 5vw, 56px);
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    @keyframes drawCheck {
      0% { stroke-dasharray: 0 60; }
      100% { stroke-dasharray: 60 0; }
    }
    @keyframes scaleIn {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); }
    }
    .check-circle { animation: scaleIn .5s cubic-bezier(.2,.8,.3,1.2) both; }
    .check-mark { animation: drawCheck .5s ease .3s both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }
    .fade-1 { animation: fadeUp .5s ease .5s both; }
    .fade-2 { animation: fadeUp .5s ease .7s both; }
    .fade-3 { animation: fadeUp .5s ease .9s both; }
    .fade-4 { animation: fadeUp .5s ease 1.1s both; }
  </style>
</head>
<body>
  <div class="thanks-shell">
    <div class="thanks-card">
      <!-- チェックアイコン -->
      <div style="margin-bottom: 28px; display: inline-flex;">
        <svg class="check-circle" width="80" height="80" viewBox="0 0 80 80" aria-hidden="true">
          <circle cx="40" cy="40" r="36" fill="#e6f4ec" />
          <circle cx="40" cy="40" r="36" fill="none" stroke="#3FA776" stroke-width="2.5" />
          <path class="check-mark" d="M26 41 L36 51 L55 31"
                stroke="#3FA776" stroke-width="4" fill="none"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>

      <div class="fade-1" style="font-size: 12px; font-weight: 700; letter-spacing: 0.16em; color: var(--orange); text-transform: uppercase; margin-bottom: 14px;">
        THANK YOU
      </div>

      <h1 class="fade-1" style="
        margin: 0; font-family: var(--font-head);
        font-size: clamp(26px, 4vw, 36px);
        font-weight: 900; line-height: 1.4; letter-spacing: -0.01em;
        color: var(--ink);
      ">
        お申し込みありがとう<br/>ございました。
      </h1>

      <p class="fade-2" style="
        margin-top: 24px; font-size: 16px; line-height: 1.95;
        color: var(--ink-soft);
      ">
        担当者より <strong style="color: var(--ink);">24時間以内</strong> にご返信いたします。<br/>
        ご記入いただいたメールアドレス宛に、<br class="hide-mobile"/>
        体験授業のご案内をお送りしますので、<br class="hide-mobile"/>
        いましばらくお待ちください。
      </p>

      <!-- 注意点ボックス -->
      <div class="fade-3" style="
        margin-top: 32px; padding: 20px 24px;
        background: var(--bg); border-radius: 8px;
        text-align: left; font-size: 13.5px; line-height: 1.85;
        color: var(--ink-soft);
      ">
        <div style="font-weight: 700; color: var(--ink); margin-bottom: 8px; font-size: 13px;">
          📩 メールが届かない場合
        </div>
        迷惑メールフォルダをご確認ください。<br/>
        24時間経っても返信がない場合は、お手数ですが
        <a href="mailto:math.math.manabieru@gmail.com" style="color: var(--blue); text-decoration: underline; text-underline-offset: 3px; font-weight: 600;">math.math.manabieru@gmail.com</a>
        までご連絡ください。
      </div>

      <!-- ボタン -->
      <div class="fade-4" style="margin-top: 40px;">
        <a href="index.html" style="
          display: inline-flex; align-items: center; gap: 12px;
          padding: 16px 32px;
          background: var(--ink); color: #fff;
          border-radius: 999px; text-decoration: none;
          font-weight: 700; font-size: 15px; letter-spacing: 0.02em;
          transition: transform .15s ease;
        " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          トップページへ戻る
          <span aria-hidden="true">→</span>
        </a>
      </div>
    </div>
  </div>

  <style>
    @media (max-width: 600px) {
      .hide-mobile { display: none; }
    }
  </style>
</body>
</html>
